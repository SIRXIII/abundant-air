<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&family=Figtree:wght@500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  .og{width:1200px;height:630px;position:relative;overflow:hidden;background:#f6f1e9;font-family:'Figtree',sans-serif;color:#16302b;padding:72px 80px;display:flex;flex-direction:column;justify-content:space-between}
  .blob1{position:absolute;right:-160px;top:-200px;width:560px;height:560px;border-radius:50%;background:#f6e3da;filter:blur(60px);opacity:.7}
  .blob2{position:absolute;left:-180px;bottom:-220px;width:520px;height:520px;border-radius:50%;background:#dcefe7;filter:blur(60px);opacity:.6}
  .logo{height:120px;position:relative;z-index:2}
  h1{font-family:'Newsreader',serif;font-weight:600;font-size:74px;line-height:1.02;letter-spacing:-.02em;position:relative;z-index:2;max-width:1000px}
  .coral{color:#c05f3c}
  .row{display:flex;align-items:center;gap:22px;position:relative;z-index:2}
  .pill{display:inline-flex;align-items:center;gap:10px;background:#fbf8f2;border:1px solid #e7decf;border-radius:999px;padding:14px 24px;font-weight:600;font-size:30px}
  .stars{color:#d9724e;font-size:32px;letter-spacing:2px}
  .phone{background:#d9724e;color:#fff;border-radius:999px;padding:14px 30px;font-weight:600;font-size:32px}
  .wave{position:absolute;left:0;right:0;bottom:0;height:16px;background:linear-gradient(90deg,#d9724e,#e8a86b,#3e9e7e)}
</style></head>
<body>
<div class="og">
  <div class="blob1"></div><div class="blob2"></div>
  <img class="logo" src="../src/assets/images/logo.png" alt="">
  <h1>Honest HVAC &amp; <span class="coral">expert ductwork</span><br>for the Coachella Valley.</h1>
  <div class="row">
    <span class="pill"><span class="stars">★★★★★</span> 5.0 on Google</span>
    <span class="pill">La&nbsp;Quinta · Coachella&nbsp;Valley</span>
    <span class="phone">(760) 423-3404</span>
  </div>
  <div class="wave"></div>
</div>
</body></html>
